name: Tado Window Advisor

on:
  schedule:
    # GitHub drops/delays scheduled triggers under load, worst at the top of the
    # hour. We fire 3x/hour at odd minutes so even when half the ticks are dropped
    # we still land ~hourly. The script is idempotent (state in the Gist, Telegram
    # only on a flip), so the extra runs are harmless — and public repos get
    # unlimited Actions minutes. See the concurrency guard below.
    - cron: "7,27,47 * * * *"
      timezone: "Europe/Amsterdam"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print advies zonder te versturen"
        type: boolean
        default: false

permissions:
  contents: write

# Serialize runs: a delayed/late-starting run must finish (tado refresh-token
# rotation + commit) before the next begins. Two overlapping runs would read the
# same refresh token and the second rotation would break the token chain.
concurrency:
  group: window-advisor
  cancel-in-progress: false

jobs:
  advise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run window advisor
        env:
          TADO_GIST_ID:           ${{ secrets.TADO_GIST_ID }}
          GIST_TOKEN:             ${{ secrets.GIST_TOKEN }}
          WU_STATION_ID:          ${{ secrets.WU_STATION_ID }}
          WU_API_KEY:             ${{ secrets.WU_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_GROUP_ID: ${{ secrets.TELEGRAM_CHAT_GROUP_ID }}
          DRY_RUN:                ${{ inputs.dry_run && '1' || '' }}
        run: python window_advisor.py

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/window_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: window advisor refresh $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
            # Andere workflows kunnen in hetzelfde venster gepusht hebben — rebase eerst.
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          fi

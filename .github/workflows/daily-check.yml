name: Daily Soil Check

on:
  schedule:
    - cron: '0 6 * * *'
      timezone: 'Europe/Amsterdam'
  workflow_dispatch:
    inputs:
      force_notify:
        description: 'Force notification even if not needed'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily check
        env:
          WU_STATION_ID: ${{ secrets.WU_STATION_ID }}
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify }}
        run: python check_and_notify.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi

name: Grasmaai-adviseur

on:
  schedule:
    - cron: '0 7 * * *'
      timezone: 'Europe/Amsterdam'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  advise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run mowing advisor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python mowing_advisor.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/mowing_data.json mowing_state.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: mowing advisor refresh $(date -u +%Y-%m-%d) [skip ci]"
            # Soil workflow may have pushed in the same window — rebase before push.
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          fi

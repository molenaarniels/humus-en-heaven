name: Daily Soil Check

on:
  schedule:
    # Twee triggers zodat het altijd om 07:00 Nederlandse tijd draait,
    # ongeacht zomer- of wintertijd:
    #   05:00 UTC = 07:00 CEST (zomertijd, mrt-okt)
    #   06:00 UTC = 07:00 CET  (wintertijd, okt-mrt)
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_notify:
        description: 'Force notification even if not needed'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check of dit de juiste trigger is voor de huidige tijdzone
        id: tz_check
        run: |
          # Bepaal of Nederland nu zomertijd (CEST, UTC+2) of wintertijd (CET, UTC+1) heeft.
          # Python geeft de correcte offset via zoneinfo.
          IS_DST=$(python3 -c "
          from datetime import datetime
          from zoneinfo import ZoneInfo
          tz = ZoneInfo('Europe/Amsterdam')
          offset = datetime.now(tz).utcoffset().seconds // 3600
          print('true' if offset == 2 else 'false')
          ")
          CURRENT_HOUR=$(date -u +%H)
          echo "is_dst=$IS_DST" >> $GITHUB_OUTPUT
          echo "current_hour=$CURRENT_HOUR" >> $GITHUB_OUTPUT
          echo "Nederlandse tijd: UTC+$([ $IS_DST = 'true' ] && echo 2 || echo 1), trigger uur: $CURRENT_HOUR UTC"

      - name: Skip als dit de verkeerde cron trigger is
        if: |
          (steps.tz_check.outputs.is_dst == 'true' && steps.tz_check.outputs.current_hour == '06') ||
          (steps.tz_check.outputs.is_dst == 'false' && steps.tz_check.outputs.current_hour == '05')
        run: |
          echo "⏭ Skip: dit is de verkeerde trigger voor de huidige tijdzone."
          exit 0

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily check
        env:
          WU_STATION_ID: ${{ secrets.WU_STATION_ID }}
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify }}
        run: python check_and_notify.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi

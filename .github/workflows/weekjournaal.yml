name: Weekjournaal

on:
  schedule:
    # Fallback ~40 min ná het orchestrator-doel (zondag 20:00 Amsterdam).
    # Normaal dispatcht de Timing Orchestrator dit al; deze cron vuurt alleen
    # als de orchestrator uitviel. De guard-job dedupt (de cron vuurt alleen op
    # zondag, dus de dag-window-check volstaat).
    - cron: "40 20 * * 0"
      timezone: "Europe/Amsterdam"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print zonder Telegram te sturen"
        type: boolean
        default: false

jobs:
  # Dedup t.o.v. de orchestrator: skip de fallback-cron als deze workflow vandaag
  # al een (niet-mislukte) run had. Alleen op `schedule` — handmatige en
  # orchestrator-dispatches (beide workflow_dispatch) draaien altijd door.
  guard:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      handled: ${{ steps.check.outputs.handled }}
    steps:
      - name: Skip if already handled today
        id: check
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          since=$(TZ=Europe/Amsterdam date -d "today 00:00" +%s)
          others=$(gh run list --workflow weekjournaal.yml -L 40 \
            --json databaseId,createdAt,conclusion \
            --jq "[.[] | select(.databaseId != ${{ github.run_id }}
                   and (.createdAt|fromdateiso8601) >= $since
                   and .conclusion != \"failure\" and .conclusion != \"cancelled\"
                   and .conclusion != \"timed_out\" and .conclusion != \"startup_failure\")] | length")
          if [ "${others:-0}" -gt 0 ]; then
            echo "handled=1" >> "$GITHUB_OUTPUT"
            echo "Al gedraaid vandaag (${others} run(s)) — orchestrator deed dit al, sla over."
          fi

  notify:
    needs: guard
    if: needs.guard.outputs.handled != '1'
    runs-on: ubuntu-latest
    # Stateless: leest alleen de checkout-artefacten, commit niets.
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Geen in-job herkansing: dit script roept behalve Telegram geen API's aan
      # (alles komt uit de lokale checkout) en send_telegram heeft z'n eigen retry.
      - name: Run weekjournaal
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: python weekjournaal.py

name: Grasmaai-adviseur

on:
  schedule:
    - cron: '0 7 * * *'
      timezone: 'Europe/Amsterdam'
  workflow_dispatch:

permissions:
  contents: write

# Eén run tegelijk: een handmatige dispatch tijdens de 07:00-cron zou anders
# tegelijk met die run mowing_data.json + mowing_state.json committen.
concurrency:
  group: mowing-notify
  cancel-in-progress: false

jobs:
  advise:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mowing advisor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python mowing_advisor.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/mowing_data.json mowing_state.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: mowing advisor refresh $(date -u +%Y-%m-%d) [skip ci]"
            # De soil-run (06:00) en de window/airflow-loops committen de hele
            # dag door naar main — rebase vóór push. De artefacten worden elke
            # run volledig opnieuw gegenereerd, dus bij conflict wint onze
            # verse versie (-X theirs). Dit draait één keer per dag: falen
            # moet hard en zichtbaar zijn (exit 1), niet stil via `|| true`.
            git rebase --abort 2>/dev/null || true
            if git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"; then
              git push
            else
              git rebase --abort 2>/dev/null || true
              echo "::error::rebase failed, mowing data not pushed"
              exit 1
            fi
          fi

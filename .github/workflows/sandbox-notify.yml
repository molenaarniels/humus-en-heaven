name: Zandbak Notificaties

on:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Europe/Amsterdam"
    - cron: "0 19 * * *"
      timezone: "Europe/Amsterdam"
  workflow_dispatch:
    inputs:
      mode:
        description: "morning of evening"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening
      override_status:
        description: "Overschrijf zandbak-status (optioneel)"
        required: false
        type: choice
        options:
          - ""
          - open
          - dicht
          - afgedekt

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python setup
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: pip install requests pytz

      - name: Bepaal mode
        id: mode
        run: |
          python3 << 'EOF'
          import os
          from datetime import datetime
          import pytz

          amsterdam = pytz.timezone("Europe/Amsterdam")
          hour = datetime.now(amsterdam).hour
          event = os.environ.get("GITHUB_EVENT_NAME", "")

          if event == "workflow_dispatch":
              mode = os.environ.get("INPUT_MODE", "morning")
          else:
              mode = "morning" if hour < 12 else "evening"

          print(f"Lokaal uur Amsterdam: {hour}, event: {event} -> mode={mode}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"mode={mode}\n")
          EOF
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}

      - name: Overschrijf status (optioneel, alleen bij workflow_dispatch)
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.override_status != ''
        run: |
          STATUS="${{ github.event.inputs.override_status }}"
          echo "Status overschreven naar: $STATUS"
          python3 -c "
          import json, datetime, os
          f = 'sandbox_state.json'
          state = json.load(open(f)) if os.path.exists(f) else {}
          state['status'] = '$STATUS'
          state['last_updated'] = datetime.datetime.utcnow().isoformat()
          json.dump(state, open(f, 'w'), indent=2)
          print('Nieuwe state:', state)
          "

      - name: Voer zandbak check uit
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          SANDBOX_STATE_FILE: sandbox_state.json
        run: python3 sandbox_notify.py ${{ steps.mode.outputs.mode }}

      - name: Commit zandbak state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sandbox_state.json
          git diff --cached --quiet || git commit -m "chore: update sandbox_state.json [skip ci]"
          git push

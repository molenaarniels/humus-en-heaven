name: Grasmaai-adviseur

on:
  schedule:
    # Fallback ~1u ná het orchestrator-doel: de orchestrator vuurt maaien zodra de
    # bodem-check (08:00) geslaagd is. Deze cron staat op 09:00 — ~20 min ná de
    # bodem-fallback (08:40) — zodat ook het fallback-pad maaien ná de bodem draait.
    # De guard-job hieronder voorkomt dubbel als de orchestrator het al deed.
    - cron: '0 9 * * *'
      timezone: 'Europe/Amsterdam'
  workflow_dispatch:

# Eén run tegelijk: een handmatige dispatch tijdens de cron zou anders
# tegelijk met die run mowing_data.json + mowing_state.json committen.
concurrency:
  group: mowing-notify
  cancel-in-progress: false

jobs:
  # Dedup t.o.v. de orchestrator: skip de fallback-cron als deze workflow vandaag
  # al een (niet-mislukte) run had. Alleen op `schedule` — handmatige en
  # orchestrator-dispatches (beide workflow_dispatch) draaien altijd door.
  guard:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      handled: ${{ steps.check.outputs.handled }}
    steps:
      - name: Skip if already handled today
        id: check
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          since=$(TZ=Europe/Amsterdam date -d "today 00:00" +%s)
          others=$(gh run list --workflow mowing-notify.yml -L 40 \
            --json databaseId,createdAt,conclusion \
            --jq "[.[] | select(.databaseId != ${{ github.run_id }}
                   and (.createdAt|fromdateiso8601) >= $since
                   and .conclusion != \"failure\" and .conclusion != \"cancelled\"
                   and .conclusion != \"timed_out\" and .conclusion != \"startup_failure\")] | length")
          if [ "${others:-0}" -gt 0 ]; then
            echo "handled=1" >> "$GITHUB_OUTPUT"
            echo "Al gedraaid vandaag (${others} run(s)) — orchestrator deed dit al, sla over."
          fi

  advise:
    needs: guard
    if: needs.guard.outputs.handled != '1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Cap dekt ook de in-job herkansing (10 min slaap + tweede poging).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mowing advisor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        # Eén herkansing na 10 min: een transiente Open-Meteo/Gist-hapering
        # kost dan geen run. run_guarded telt mee in RUNNER_TEMP (zelfde job)
        # en alert pas bij de 2e mislukking (fail_threshold=2).
        run: |
          python mowing_advisor.py || {
            echo "::warning::eerste poging mislukt — herkansing over 10 min"
            sleep 600
            python mowing_advisor.py
          }

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/mowing_data.json mowing_state.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: mowing advisor refresh $(date -u +%Y-%m-%d) [skip ci]"
            # De soil-run (08:00) en de window/airflow-loops committen de hele
            # dag door naar main — rebase vóór push. De artefacten worden elke
            # run volledig opnieuw gegenereerd, dus bij conflict wint onze
            # verse versie (-X theirs). Dit draait één keer per dag: falen
            # moet hard en zichtbaar zijn (exit 1), niet stil via `|| true`.
            git rebase --abort 2>/dev/null || true
            if git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"; then
              git push
            else
              git rebase --abort 2>/dev/null || true
              echo "::error::rebase failed, mowing data not pushed"
              exit 1
            fi
          fi

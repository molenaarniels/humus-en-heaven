name: Daily Weather Briefing

on:
  schedule:
    - cron: "0 2 * * *"
      timezone: "Europe/Amsterdam"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    # Cap dekt ook de in-job herkansing (10 min slaap + tweede poging).
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weather briefing
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_GROUP_ID: ${{ secrets.TELEGRAM_CHAT_GROUP_ID }}
        # Eén herkansing na 10 min: een transiente Open-Meteo-hapering kost dan
        # geen run. run_guarded telt mee in RUNNER_TEMP (zelfde job) en alert
        # pas bij de 2e mislukking (fail_threshold=2).
        run: |
          python weather_briefing.py || {
            echo "::warning::eerste poging mislukt — herkansing over 10 min"
            sleep 600
            python weather_briefing.py
          }

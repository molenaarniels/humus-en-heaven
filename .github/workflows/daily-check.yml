name: Daily Soil Check

on:
  schedule:
    # Fallback ~40 min ná het orchestrator-doel (08:00 Amsterdam). Normaal heeft
    # de Timing Orchestrator deze job al om 08:00 gedispatcht; deze cron vuurt
    # alleen als de orchestrator uitviel. De guard-job hieronder voorkomt dubbel.
    - cron: '40 8 * * *'
      timezone: 'Europe/Amsterdam'
  workflow_dispatch:
    inputs:
      force_notify:
        description: 'Force notification even if not needed'
        required: false
        default: 'false'

# Eén run tegelijk: een handmatige dispatch tijdens de cron zou anders
# tegelijk met die run docs/data.json committen.
concurrency:
  group: daily-check
  cancel-in-progress: false

jobs:
  # Dedup t.o.v. de orchestrator: skip de fallback-cron als deze workflow vandaag
  # al een (niet-mislukte) run had. Alleen op `schedule` — handmatige en
  # orchestrator-dispatches (beide workflow_dispatch) draaien altijd door.
  guard:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      handled: ${{ steps.check.outputs.handled }}
    steps:
      - name: Skip if already handled today
        id: check
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          since=$(TZ=Europe/Amsterdam date -d "today 00:00" +%s)
          others=$(gh run list --workflow daily-check.yml -L 40 \
            --json databaseId,createdAt,conclusion \
            --jq "[.[] | select(.databaseId != ${{ github.run_id }}
                   and (.createdAt|fromdateiso8601) >= $since
                   and .conclusion != \"failure\" and .conclusion != \"cancelled\"
                   and .conclusion != \"timed_out\" and .conclusion != \"startup_failure\")] | length")
          if [ "${others:-0}" -gt 0 ]; then
            echo "handled=1" >> "$GITHUB_OUTPUT"
            echo "Al gedraaid vandaag (${others} run(s)) — orchestrator deed dit al, sla over."
          fi

  check:
    needs: guard
    if: needs.guard.outputs.handled != '1'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # API-calls + commit duren normaal <5 min; zonder cap houdt een hangende
    # HTTP-call de runner 6 uur (GitHub-default) vast. De cap dekt ook de
    # in-job herkansing (10 min slaap + tweede poging) bij een API-storing.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily check
        env:
          WU_STATION_ID: ${{ secrets.WU_STATION_ID }}
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify }}
        # Eén herkansing na 10 min: een transiente Open-Meteo-hapering om
        # 08:00 kost dan geen dag data. run_guarded telt mee in RUNNER_TEMP
        # (zelfde job) en alert pas bij de 2e mislukking (fail_threshold=2).
        run: |
          python check_and_notify.py || {
            echo "::warning::eerste poging mislukt — herkansing over 10 min"
            sleep 600
            python check_and_notify.py
          }

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
            # De window/airflow-loops committen de hele dag door naar main —
            # zonder rebase kan deze push racen en faalt de dagelijkse update
            # stilletjes. data.json wordt elke run volledig opnieuw gegenereerd,
            # dus bij conflict wint onze verse versie (-X theirs, zie de
            # uitleg in window-notify.yml). Dit draait één keer per dag:
            # falen moet hier juist hard en zichtbaar zijn (exit 1).
            git rebase --abort 2>/dev/null || true
            if git pull --rebase -X theirs origin "${GITHUB_REF_NAME}"; then
              git push
            else
              git rebase --abort 2>/dev/null || true
              echo "::error::rebase failed, daily data not pushed"
              exit 1
            fi
          fi
